<!DOCTYPE html>
<html>
<head>
  <title>Input</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-100 to-blue-100 p-6">

<div class="max-w-5xl mx-auto bg-white p-8 rounded-2xl shadow-lg">

  <h2 class="text-2xl font-semibold text-slate-700 mb-6">
    Enter System Details
  </h2>

  <div class="flex gap-4 mb-4">
    <input id="processes" type="number" placeholder="Processes"
      class="border border-slate-300 p-2 rounded-lg w-40 focus:ring-2 focus:ring-blue-300">

    <input id="resources" type="number" placeholder="Resources"
      class="border border-slate-300 p-2 rounded-lg w-40 focus:ring-2 focus:ring-blue-300">

    <button onclick="generateTables()"
      class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg shadow">
      Generate
    </button>
  </div>

  <div id="tables" class="mt-6"></div>

  <button onclick="saveData()"
    class="mt-6 bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg shadow">
    Next
  </button>

</div>

<script src="script.js"></script>
</body>
</html>
